<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>QRin.space</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #111;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100svh;
    }

    .container {
      text-align: center;
      padding: 20px;
      animation: fade 0.6s ease;
    }

    @keyframes fade {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .brand {
      font-size: 14px;
      color: #0468fe;
      margin-bottom: 10px;
      letter-spacing: 1px;
      text-shadow: 0 0 8px rgba(4, 104, 254, 0.4);
    }

    h1 {
      font-size: 32px;
      margin: 10px 0;
    }

    .desc {
      color: #aaa;
      font-size: 14px;
      margin-bottom: 30px;
    }

    .box {
      border: 1px solid rgba(4, 104, 254, 0.3);
      border-radius: 12px;
      padding: 20px;
      background: #111;
      display: inline-block;
      min-width: 260px;
      transition: 0.2s ease;
    }

    .box:hover {
      border-color: #0468fe;
      box-shadow: 0 0 20px rgba(4, 104, 254, 0.15);
    }

    .project-name {
      font-size: 20px;
      margin-bottom: 8px;
    }

    .status {
      font-size: 13px;
      color: #777;
    }

    .footer {
      margin-top: 30px;
      font-size: 12px;
      color: #555;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="brand">Newhouse</div>

    <h1>Coming Soon</h1>
    <div class="desc">A new project is being prepared.</div>

    <div class="box">
      <div class="project-name">QRin.space</div>
      <div class="status">Coming 2026</div>
    </div>
  </div>

</body>
</html>
